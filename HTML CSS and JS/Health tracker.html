<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalPulse | Advanced Health Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <h1 class="text-2xl font-bold text-indigo-600 tracking-tight">VitalPulse</h1>
        <div class="space-x-4">
            <span class="text-sm font-medium text-slate-500">Welcome back, User</span>
            <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">Sync Device</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-8">
        
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-medium uppercase">Daily Steps</p>
                <h2 class="text-3xl font-bold mt-1">8,432</h2>
                <div class="mt-4 w-full bg-slate-100 rounded-full h-2">
                    <div class="bg-indigo-500 h-2 rounded-full" style="width: 84%"></div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-medium uppercase">Sleep Quality</p>
                <h2 class="text-3xl font-bold mt-1">7h 20m</h2>
                <p class="text-green-500 text-xs font-bold mt-2">↑ 12% from last night</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-medium uppercase">Hydration</p>
                <h2 class="text-3xl font-bold mt-1">1.8 <span class="text-lg font-normal">L</span></h2>
                <p class="text-slate-400 text-xs mt-2">Goal: 2.5 L</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-medium uppercase">Avg Heart Rate</p>
                <h2 class="text-3xl font-bold mt-1">68 <span class="text-lg font-normal">BPM</span></h2>
                <p class="text-indigo-400 text-xs mt-2 italic">Resting state</p>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section class="lg:col-span-1 bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-bold mb-6">Log New Entry</h3>
                <form id="healthForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Metric Type</label>
                        <select class="w-full border border-slate-200 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option>Daily Steps</option>
                            <option>Weight (kg)</option>
                            <option>Calorie Intake</option>
                            <option>Sleep Duration</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Value</label>
                        <input type="number" placeholder="Enter number..." class="w-full border border-slate-200 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Date</label>
                        <input type="date" class="w-full border border-slate-200 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <button type="button" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition mt-4">Add Entry</button>
                </form>
            </section>

            <section class="lg:col-span-2 bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">Activity Overview</h3>
                    <select class="text-sm border-none bg-slate-50 rounded-md p-1 font-medium">
                        <option>Last 7 Days</option>
                        <option>Last 30 Days</option>
                    </select>
                </div>
                <div class="h-64">
                    <canvas id="activityChart"></canvas>
                </div>
            </section>
        </div>

    </main>

    <script>
        // Chart Configuration
        const ctx = document.getElementById('activityChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Steps Walked',
                    data: [6500, 8200, 7800, 9500, 8432, 11000, 9000],
                    borderColor: '#4f46e5',
                    backgroundColor: 'rgba(79, 70, 229, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 3,
                    pointRadius: 4,
                    pointBackgroundColor: '#4f46e5'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: true, grid: { display: false } },
                    x: { grid: { display: false } }
                }
            }
        });
    </script>
</body>
</html>
