<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalPulse Pro | Data-Driven Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <h1 class="text-2xl font-bold text-indigo-600 tracking-tight">VitalPulse <span class="text-slate-400 font-light text-sm italic">LocalSave™</span></h1>
        <button onclick="clearData()" class="text-xs text-red-500 hover:underline">Reset All Data</button>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-8">
        
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-medium uppercase">Last Step Count</p>
                <h2 id="stepDisplay" class="text-3xl font-bold mt-1">0</h2>
                <p class="text-slate-400 text-xs mt-2">Daily Goal: 10,000</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-medium uppercase">Avg Sleep</p>
                <h2 id="sleepDisplay" class="text-3xl font-bold mt-1">0h</h2>
                <p class="text-indigo-500 text-xs font-bold mt-2 italic">Based on history</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-medium uppercase">Total Water</p>
                <h2 id="waterDisplay" class="text-3xl font-bold mt-1">0 <span class="text-lg font-normal">L</span></h2>
                <p class="text-slate-400 text-xs mt-2">Cumulative</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-medium uppercase">Latest BPM</p>
                <h2 id="bpmDisplay" class="text-3xl font-bold mt-1">--</h2>
                <p class="text-red-400 text-xs mt-2">Heart Rate</p>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section class="lg:col-span-1 bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-bold mb-6">Log New Entry</h3>
                <form id="healthForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Metric Type</label>
                        <select id="metricType" class="w-full border border-slate-200 rounded-lg p-2 focus:ring-2 focus:indigo-500 outline-none">
                            <option value="steps">Steps Walked</option>
                            <option value="sleep">Sleep (Hours)</option>
                            <option value="water">Water (Liters)</option>
                            <option value="bpm">Heart Rate (BPM)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Value</label>
                        <input type="number" id="metricValue" step="0.1" required placeholder="Enter value..." class="w-full border border-slate-200 rounded-lg p-2 focus:ring-2 focus:indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Date</label>
                        <input type="date" id="metricDate" required class="w-full border border-slate-200 rounded-lg p-2 focus:ring-2 focus:indigo-500 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition mt-4 shadow-lg shadow-indigo-200">Save Record</button>
                </form>
            </section>

            <section class="lg:col-span-2 bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-bold mb-6">Step History (Last 7 Entries)</h3>
                <div class="h-64">
                    <canvas id="activityChart"></canvas>
                </div>
            </section>
        </div>
    </main>

    <script>
        // --- DATA LOGIC ---
        let healthData = JSON.parse(localStorage.getItem('vitalPulseData')) || [];

        const form = document.getElementById('healthForm');
        const activityCtx = document.getElementById('activityChart').getContext('2d');
        let myChart;

        // Initialize Chart
        function initChart() {
            const stepEntries = healthData.filter(d => d.type === 'steps').slice(-7);
            const labels = stepEntries.map(d => d.date);
            const values = stepEntries.map(d => d.value);

            myChart = new Chart(activityCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Steps',
                        data: values,
                        borderColor: '#4f46e5',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(79, 70, 229, 0.1)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function updateUI() {
            // Update Metric Displays
            const steps = healthData.filter(d => d.type === 'steps');
            const sleep = healthData.filter(d => d.type === 'sleep');
            const water = healthData.filter(d => d.type === 'water');
            const bpm = healthData.filter(d => d.type === 'bpm');

            document.getElementById('stepDisplay').innerText = steps.length ? steps[steps.length-1].value.toLocaleString() : '0';
            
            const avgSleep = sleep.reduce((acc, curr) => acc + parseFloat(curr.value), 0) / (sleep.length || 1);
            document.getElementById('sleepDisplay').innerText = sleep.length ? avgSleep.toFixed(1) + 'h' : '0h';
            
            const totalWater = water.reduce((acc, curr) => acc + parseFloat(curr.value), 0);
            document.getElementById('waterDisplay').innerText = totalWater.toFixed(1) + ' L';
            
            document.getElementById('bpmDisplay').innerText = bpm.length ? bpm[bpm.length-1].value : '--';

            // Update Chart
            const stepEntries = healthData.filter(d => d.type === 'steps').slice(-7);
            myChart.data.labels = stepEntries.map(d => d.date);
            myChart.data.datasets[0].data = stepEntries.map(d => d.value);
            myChart.update();
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newEntry = {
                type: document.getElementById('metricType').value,
                value: document.getElementById('metricValue').value,
                date: document.getElementById('metricDate').value
            };

            healthData.push(newEntry);
            localStorage.setItem('vitalPulseData', JSON.stringify(healthData));
            updateUI();
            form.reset();
        });

        function clearData() {
            if(confirm("Delete all health history?")) {
                localStorage.removeItem('vitalPulseData');
                location.reload();
            }
        }

        // Run on load
        initChart();
        updateUI();
    </script>
</body>
</html>
