<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Chess Logic</title>
    <style>
        :root {
            --light-sq: #dee3e6;
            --dark-sq: #8ca2ad;
            --highlight: rgba(241, 196, 15, 0.6);
            --valid-move: rgba(46, 204, 113, 0.4);
        }

        body { 
            display: flex; flex-direction: column; align-items: center; 
            background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; 
        }

        .status { margin: 20px; font-size: 1.5rem; font-weight: bold; }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            border: 8px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .sq {
            width: 70px; height: 70px; display: flex;
            justify-content: center; align-items: center;
            font-size: 45px; cursor: pointer; position: relative;
        }

        .white { background: var(--light-sq); }
        .black { background: var(--dark-sq); }
        
        .selected { background: var(--highlight) !important; }
        .hint::after {
            content: ''; width: 20px; height: 20px;
            background: var(--valid-move); border-radius: 50%;
            position: absolute;
        }

        /* Prevent text selection */
        .sq { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body>

    <div class="status" id="status">White's Turn</div>
    <div id="board"></div>

<script>
class ChessGame {
    constructor() {
        this.board = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];
        this.turn = 'white'; // White is uppercase, Black is lowercase
        this.selected = null;
        this.validMoves = [];
        
        this.pieces = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        this.init();
    }

    init() {
        this.render();
        document.getElementById('board').addEventListener('click', (e) => {
            const sq = e.target.closest('.sq');
            if (sq) this.handleSquareClick(parseInt(sq.dataset.r), parseInt(sq.dataset.c));
        });
    }

    render() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const div = document.createElement('div');
                div.className = `sq ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                div.dataset.r = r; div.dataset.c = c;
                
                if (this.selected?.r === r && this.selected?.c === c) div.classList.add('selected');
                if (this.validMoves.some(m => m.r === r && m.c === c)) div.classList.add('hint');

                div.innerText = this.pieces[this.board[r][c]] || '';
                boardEl.appendChild(div);
            }
        }
        document.getElementById('status').innerText = `${this.turn.charAt(0).toUpperCase() + this.turn.slice(1)}'s Turn`;
    }

    handleSquareClick(r, c) {
        const piece = this.board[r][c];
        const isWhite = piece === piece.toUpperCase() && piece !== '';
        const isBlack = piece === piece.toLowerCase() && piece !== '';

        // 1. Selecting a piece
        if ((this.turn === 'white' && isWhite) || (this.turn === 'black' && isBlack)) {
            this.selected = { r, c };
            this.calculateValidMoves(r, c, piece);
            this.render();
            return;
        }

        // 2. Moving a piece
        if (this.selected && this.validMoves.some(m => m.r === r && m.c === c)) {
            this.board[r][c] = this.board[this.selected.r][this.selected.c];
            this.board[this.selected.r][this.selected.c] = '';
            this.turn = this.turn === 'white' ? 'black' : 'white';
            this.selected = null;
            this.validMoves = [];
            this.render();
        }
    }

    calculateValidMoves(r, c, piece) {
        this.validMoves = [];
        const type = piece.toLowerCase();

        // Simple Pawn Logic
        if (type === 'p') {
            const dir = piece === 'P' ? -1 : 1;
            if (this.board[r + dir] && this.board[r + dir][c] === '') {
                this.validMoves.push({ r: r + dir, c });
            }
        }
        
        // Simple Knight Logic (L-shapes)
        if (type === 'n') {
            const jumps = [[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]];
            jumps.forEach(([dr, dc]) => {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                    const target = this.board[nr][nc];
                    // Can move if empty or opponent piece
                    if (target === '' || (piece === 'N' ? target === target.toLowerCase() : target === target.toUpperCase())) {
                        this.validMoves.push({ r: nr, c: nc });
                    }
                }
            });
        }
        // ... (Other pieces would follow similar logic)
    }
}

new ChessGame();
</script>
</body>
</html>
